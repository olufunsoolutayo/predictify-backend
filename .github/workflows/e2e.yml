name: E2E Tests (Nightly)

on:
  # Run nightly at 2 AM UTC
  schedule:
    - cron: '0 2 * * *'
  
  # Allow manual trigger
  workflow_dispatch:
  
  # Optionally run on push to main for immediate feedback
  push:
    branches:
      - main
    paths:
      - 'tests/e2e/**'
      - '.github/workflows/e2e.yml'

jobs:
  e2e-testnet:
    name: E2E Prediction Lifecycle (Testnet)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: predictify_e2e
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/predictify_e2e
        run: npm run db:migrate

      - name: Run E2E tests
        env:
          # Database
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/predictify_e2e
          
          # Redis
          REDIS_URL: redis://localhost:6379
          
          # Stellar/Soroban (testnet)
          STELLAR_NETWORK: testnet
          SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          HORIZON_URL: https://horizon-testnet.stellar.org
          PREDICTIFY_CONTRACT_ID: ${{ secrets.TESTNET_CONTRACT_ID }}
          
          # Test account (funded testnet account)
          E2E_TEST_SECRET_KEY: ${{ secrets.E2E_TEST_SECRET_KEY }}
          
          # JWT
          JWT_SECRET: ${{ secrets.E2E_JWT_SECRET }}
          JWT_ISSUER: predictify-e2e-ci
          JWT_AUDIENCE: predictify-e2e-ci-app
          
          # Application config
          NODE_ENV: test
          PORT: 3001
          LOG_LEVEL: info
          
          # Disable rate limiting for tests
          ANON_RATE_LIMIT_MAX: 10000
          CAPTCHA_THRESHOLD: 0
          
          # Admin allowlist (optional)
          ADMIN_ALLOWLIST: ${{ secrets.E2E_ADMIN_ADDRESS }}
          
        run: npm test -- tests/e2e/predictionLifecycle.test.ts --verbose

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            coverage/
            test-results/
          retention-days: 30

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            const message = `🚨 **E2E Test Failure**\n\nThe nightly E2E prediction lifecycle test failed.\n\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n**Workflow:** ${context.workflow}\n**Commit:** ${context.sha.substring(0, 7)}\n\nPlease investigate and fix the issue.`;
            
            // Create an issue if this is a scheduled run
            if (context.eventName === 'schedule') {
              github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `E2E Test Failure - ${new Date().toISOString().split('T')[0]}`,
                body: message,
                labels: ['e2e-failure', 'bug', 'priority']
              });
            }

  # Optional: Run against multiple contract versions or configurations
  e2e-matrix:
    name: E2E Matrix Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch'
    
    strategy:
      fail-fast: false
      matrix:
        node-version: [20]
        test-scenario:
          - name: standard-lifecycle
            description: Standard prediction lifecycle
          - name: multiple-predictions
            description: Multiple predictions on same market
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: predictify_e2e_matrix
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/predictify_e2e_matrix
        run: npm run db:migrate

      - name: Run E2E test - ${{ matrix.test-scenario.name }}
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/predictify_e2e_matrix
          REDIS_URL: redis://localhost:6379
          STELLAR_NETWORK: testnet
          SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          HORIZON_URL: https://horizon-testnet.stellar.org
          PREDICTIFY_CONTRACT_ID: ${{ secrets.TESTNET_CONTRACT_ID }}
          E2E_TEST_SECRET_KEY: ${{ secrets.E2E_TEST_SECRET_KEY }}
          JWT_SECRET: ${{ secrets.E2E_JWT_SECRET }}
          NODE_ENV: test
          ANON_RATE_LIMIT_MAX: 10000
          CAPTCHA_THRESHOLD: 0
        run: npm test -- tests/e2e/ --verbose

      - name: Upload test results - ${{ matrix.test-scenario.name }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results-${{ matrix.test-scenario.name }}
          path: coverage/
          retention-days: 30
